changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Infrastructure & CI
      labels:
        - ci
        - infrastructure
        - dependencies
    - title: Other Changes
      labels:
        - '*'
